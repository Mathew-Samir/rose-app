<header class="w-full bg-white border-b border-gray-100 shadow-xs px-4 py-5 md:px-8" style="padding-top: 1%;padding-bottom: 1%;">
  <div class="w-full mx-auto flex items-center justify-around gap-6">
    
    <div class="flex-shrink-0 flex items-center cursor-pointer">
      <img src="/images/rose.png" alt="Rose" class="h-11 w-auto object-contain fallback-text" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <span class="hidden text-pink-600 font-bold text-xl tracking-wider font-sans">Rose</span>
    </div>

    <div class="flex-1 max-w-3xl relative hidden md:block">
      <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none z-10">
        <i class="pi pi-search text-gray-400 text-base"></i>
      </div>
      <input 
        pInputText
        type="text" 
        placeholder="What awesome gift are you looking for?" 
        class="w-full !pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-hidden focus:border-pink-400 focus:ring-1 focus:ring-pink-400 transition-all shadow-2xs"
      />
    </div>

    <div class="flex items-center gap-4 md:gap-6 text-gray-700 flex-shrink-0">
      
      <button class="flex items-center gap-2 hover:text-pink-500 transition-colors cursor-pointer text-sm font-medium py-1">
        <i class="pi pi-user text-base"></i>
        <span class="hidden sm:inline">{{ "AUTH.LOGIN" | translate }}</span>
      </button>

      <div class="h-5 w-[1px] bg-gray-200 hidden sm:block"></div>

      <div class="flex items-center gap-5 text-lg">
        <button class="hover:text-pink-500 transition-colors cursor-pointer flex items-center">
          <i class="pi pi-heart"></i>
        </button>

        <button class="hover:text-pink-500 transition-colors cursor-pointer flex items-center relative">
          <i class="pi pi-shopping-cart"></i>
          <span class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center scale-90 shadow-sm">
            2
          </span>
        </button>

        <button class="hover:text-pink-500 transition-colors cursor-pointer flex items-center">
          <i class="pi pi-bell"></i>
        </button>
      </div>

      <div class="h-5 w-[1px] bg-gray-200"></div>

      <button 
        (click)="translationService.toggleLanguage()"
        class="text-sm font-semibold text-gray-600 hover:text-pink-500 transition-colors cursor-pointer min-w-[50px] text-right">
        {{ "TOGGLE_LANG" | translate }}
      </button>

    </div>
  </div>

  <div class="mt-3 relative md:hidden w-full">
    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none z-10">
      <i class="pi pi-search text-gray-400 text-sm"></i>
    </div>
    <input 
      pInputText
      type="text" 
      [placeholder]="'NAVBAR.SEARCH_NAVBAR' | translate"
      class="w-full !pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-hidden focus:border-pink-400"
    />
  </div>
</header>
