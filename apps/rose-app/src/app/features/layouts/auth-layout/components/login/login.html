<div class="login-container">
  <!-- Title -->
  <div class="title">
    <img src="/images/Welcome back!.svg" alt="Welcome back" />
  </div>

  <div class="footer-divider"></div>

  <!-- Form -->
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    @if (errorMessage()) {
      <div class="error-message">
        {{ errorMessage() }}
      </div>
    }

    <div class="form-group">
      <label for="username">{{ "AUTH.FORMS.USERNAME" | translate }}</label>
      <input 
        id="username" 
        type="text" 
        formControlName="username" 
        [class.invalid]="loginForm.controls.username.touched && loginForm.controls.username.invalid"
      />
    </div>

    <div class="form-group">
      <label for="password">{{ "AUTH.FORMS.PASSWORD" | translate }}</label>
      <input 
        id="password" 
        type="password" 
        formControlName="password" 
        [class.invalid]="loginForm.controls.password.touched && loginForm.controls.password.invalid"
      />
    </div>

    <button type="submit" [disabled]="isLoading()" class="submit-btn">
      @if (isLoading()) {
        <span>...</span>
      } @else {
        <span>{{ "AUTH.LOGIN" | translate }}</span>
      }
    </button>
  </form>
  <!-- Divider -->
  <div class="footer-divider"></div>

  <!-- Register -->
  <p class="register-text">
    {{ "AUTH.DONT_HAVE_AN_ACCOUNT" | translate }}

    <a routerLink="/auth-layout/register"> {{ "AUTH.CREATE_ONE_NOW" | translate }} </a>
  </p>
</div>
